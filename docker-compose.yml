version: '3.8'

services:
  
# ==================== Keycloak (shared — already exist in DMS stack) ====================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: keycloak
    env_file:
      - .env
    command:
      - start-dev      
      - --import-realm   
      - --https-certificate-file=/opt/keycloak/certs/keycloak.crt
      - --https-certificate-key-file=/opt/keycloak/certs/keycloak.key
      - --https-port=8443
      - --hostname-strict=false 
      - --log-level=INFO,org.keycloak.broker:DEBUG,org.keycloak.events:DEBUG

    depends_on:
      - keycloak-db
    #dev only
    ports:
      - "8443:8443"     
    networks:
      - portal-network   
    volumes:
      - ./exports/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak-providers/keycloak-gsis-provider_gunet.jar:/opt/keycloak/providers/keycloak-gsis-provider.jar
      - ./certs:/opt/keycloak/certs

  keycloak-db:
    image: postgres:15.2
    container_name: keycloak-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${KC_DB_USERNAME}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB: ${KC_DB_POSTGRES_DB}
    #dev only
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/keycloak_db_data:/var/lib/postgresql/data
    networks:
      - portal-network
      
  # ==================== Kafka (shared — already exist in DMS stack) ====================   
  
  kafka1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka1
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,DOCKER://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,DOCKER://kafka1:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "DOCKER"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - portal-network
    healthcheck:
      test: [ "CMD",  "kafka-topics",   "--bootstrap-server", "localhost:9092",  "--list", ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - kafka1-data:/var/lib/kafka/data
      
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka1:19092
      - SERVER_PORT=8080
    depends_on:
      - kafka1     
    networks:
      - portal-network
    restart: always 

  # ==================== CitizenPortal Database ====================
  citizen-portal-db:
    image: postgres:15.2
    container_name: citizen-portal-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PORTAL_DB_POSTGRES_DB}
      POSTGRES_USER: ${PORTAL_DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PORTAL_DB_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - citizen-portal-db-data:/var/lib/postgresql/data
    networks:
      - portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTAL_DB_POSTGRES_USER:-portaluser} -d ${PORTAL_DB_POSTGRES_DB:-citizenportaldb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== CitizenPortal API ====================
  citizen-portal-api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile    
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    depends_on:
      citizen-portal-db:
        condition: service_healthy
      kafka1:
        condition: service_started
    ports:
      - "5051:8080"
    networks:
      - portal-network
      - storage-network
    volumes:
      - ./error-codes/errors.json:/app/errors.json:ro

volumes:
  citizen-portal-db-data:
  keycloak-db-data:
  kafka1-data:  

networks:
 portal-network:
    driver: bridge
 storage-network:
    external: true 