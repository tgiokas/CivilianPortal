version: '3.8'

services:
  # ==================== CitizenPortal API ====================
  citizen-portal-api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: citizen-portal-api
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    depends_on:
      citizen-portal-db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "5040:8080"
    networks:
      - portal-network
    volumes:
      - ./error-codes/errors.json:/app/errors.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.citizen-portal.rule=PathPrefix(`/api/citizen`)"
      - "traefik.http.services.citizen-portal.loadbalancer.server.port=8080"

  # ==================== CitizenPortal Database ====================
  citizen-portal-db:
    image: postgres:16-alpine
    container_name: citizen-portal-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PORTAL_DB_POSTGRES_DB}
      POSTGRES_USER: ${PORTAL_DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PORTAL_DB_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - citizen-portal-db-data:/var/lib/postgresql/data
    networks:
      - portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTAL_DB_POSTGRES_USER:-portaluser} -d ${PORTAL_DB_POSTGRES_DB:-citizenportaldb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Kafka (shared — may already exist in DMS stack) ====================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - portal-network

  # ==================== Keycloak (shared — may already exist in DMS stack) ====================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - portal-network

  # ==================== Keycloak Database ====================
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloakuser} -d ${KEYCLOAK_DB_NAME:-keycloakdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  citizen-portal-db-data:
  keycloak-db-data:

networks:
  portal-network:
    driver: bridge
    # In production, this joins the existing DMS network:
    # external: true
    # name: archium-network
